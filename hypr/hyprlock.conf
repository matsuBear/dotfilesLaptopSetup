source = ~/.config/hypr/lockColors.conf

background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 1.0)

    blur_passes = 4 
    blur_size = 8
    noise = 0.0617
    contrast = 0.8916
    brightness = 0.5172
    vibrancy = 0.3696
    vibrancy_darkness = 0.3
}

input-field {
    size = 370, 75
    outline_thickness = 3 
    dots_size = 0.33 
    dots_spacing = 0.35 
    dots_center = true
    
    outer_color = $prim 
    inner_color = $low
    font_color = $high
    
    fade_on_empty = true
    placeholder_text = Logged: $LOGNAME
    font_family=ShureTechMono Nerd Font
    hide_input = false
    position = 0, -30
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%R")"
    color = $high
    font_size = 90
    font_family = Keania One 
    position = 60, -40
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = $high
    font_size = 40
    font_family = ShureTechMono Nerd Font
    position = 60, -160
    halign = left
    valign = top
}
